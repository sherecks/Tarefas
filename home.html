<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/0db4c44db2.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="stylehome.css"/>
    <link rel="script" href="tarefas.js" as="script"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <title>Tarefas</title>
</head>
<body>

    <div class="cont">
        <div class="topo">
            <input type="text" id="novatarefa" placeholder="Adicione uma tarefa">
            <button id="addtarefa">
                <i class="fa fa-plus"></i>
            </button>
        </div>

        <ul id="listatarefa">
        </ul>
    </div>


    <div id="janelaedicao">
        <button id="fechar">
            <i class="fa fa-remove fa-2x"></i>
        </button>
        <h2 id="idtarefaedicao"></h2>
        <hr>
        <form>
            <div class="linha">
                <label for="nome">Título</label>
                <input type="text" id="tarefanomeedicao">
            </div>
            <div class="linha">
                <button id="atualizar">Salvar</button>
            </div>
        </form>
    </div>
    <div id="janelaedicaofundo"></div>

    <div id ="janelaexcluir">
        <button id="fechar2">
            <i class="fa fa-remove fa-2x"></i>
        </button>
        <h2> Tem certeza que deseja excluir?</h2>
        <button id="apagar">Excluir</button>
    </div>
    <div id="janelaexcluirfundo"></div>

    <script src="tarefas.js"></script>
    
</body>
</html>
